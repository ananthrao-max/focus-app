<!DOCTYPE html>
<html>
<head><title>Generate FocusFlow Icon</title></head>
<body style="background:#333;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:20px">
<canvas id="icon" width="1024" height="1024"></canvas>
<a id="download" download="icon-1024.png" style="color:white;font-size:20px;cursor:pointer">Download 1024x1024 Icon</a>
<script>
const canvas = document.getElementById('icon');
const ctx = canvas.getContext('2d');
const size = 1024;

// Background
ctx.fillStyle = '#0C0C12';
ctx.beginPath();
ctx.roundRect(0, 0, size, size, size * 0.22);
ctx.fill();

// Gold "FF" text
ctx.fillStyle = '#C8A84E';
ctx.font = 'bold 420px -apple-system, "SF Pro Display", "Helvetica Neue", sans-serif';
ctx.textAlign = 'center';
ctx.textBaseline = 'middle';
ctx.fillText('FF', size / 2, size / 2 + 10);

// Download link
const link = document.getElementById('download');
link.href = canvas.toDataURL('image/png');
link.onclick = () => {};

// Also show scaled preview
canvas.style.width = '256px';
canvas.style.height = '256px';
canvas.style.borderRadius = '56px';
</script>
</body>
</html>
