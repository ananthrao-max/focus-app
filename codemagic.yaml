workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 30
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Codemagic
    environment:
      groups:
        - signing
      vars:
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
      node: 18
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install dependencies
        script: npm ci
      - name: Build web assets
        script: npm run build
      - name: Sync Capacitor
        script: npx cap sync ios
      - name: Install CocoaPods
        script: |
          cd ios/App
          pod install
      - name: Set up keychain
        script: keychain initialize
      - name: Fetch signing files
        script: |
          app-store-connect fetch-signing-files "app.getkeel" \
            --type IOS_APP_STORE \
            --create
      - name: Set up code signing
        script: xcode-project use-profiles
      - name: Build iOS app
        script: |
          echo "=== DEBUG: CODE_SIGN_IDENTITY in project before fix ==="
          grep -n "CODE_SIGN_IDENTITY" ios/App/App.xcodeproj/project.pbxproj || true
          echo "=== DEBUG: Keychain certificates ==="
          security find-identity -v -p codesigning
          echo "=== DEBUG: Provisioning profiles ==="
          ls ~/Library/MobileDevice/Provisioning\ Profiles/ || true
          echo "=== Forcing ALL CODE_SIGN_IDENTITY to Apple Distribution ==="
          sed -i '' 's/CODE_SIGN_IDENTITY = "[^"]*"/CODE_SIGN_IDENTITY = "Apple Distribution"/g' ios/App/App.xcodeproj/project.pbxproj
          echo "=== DEBUG: CODE_SIGN_IDENTITY after fix ==="
          grep -n "CODE_SIGN_IDENTITY" ios/App/App.xcodeproj/project.pbxproj || true
          echo "=== Building ==="
          xcode-project build-ipa \
            --workspace "ios/App/App.xcworkspace" \
            --scheme "App" 2>&1 || {
            echo "=== XCODE BUILD LOGS ==="
            if ls /tmp/xcodebuild_logs/*.log 1>/dev/null 2>&1; then
              cat /tmp/xcodebuild_logs/*.log | tail -100
            fi
            echo "=== END LOGS ==="
            exit 1
          }
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
