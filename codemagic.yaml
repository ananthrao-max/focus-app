workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 30
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Codemagic
    environment:
      groups:
        - signing
      vars:
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
      node: 18
      xcode: 16.2
      cocoapods: default
    scripts:
      - name: Install dependencies
        script: npm ci
      - name: Build web assets
        script: npm run build
      - name: Sync Capacitor
        script: npx cap sync ios
      - name: Install CocoaPods
        script: |
          cd ios/App
          pod install
      - name: Set up keychain
        script: keychain initialize
      - name: Fetch signing files
        script: |
          app-store-connect fetch-signing-files "app.getkeel" \
            --type IOS_APP_STORE \
            --create
      - name: Set up code signing
        script: |
          xcode-project use-profiles

          echo "=== Signing identities after import ==="
          security find-identity -v -p codesigning

          CERT_NAME=$(security find-identity -v -p codesigning | grep -i "distribution" | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "=== Detected certificate: '$CERT_NAME' ==="

          if [ -z "$CERT_NAME" ]; then
            echo "No identity after use-profiles, trying manual .p12 import..."
            KEYCHAIN=$(security list-keychains | head -1 | tr -d '"' | xargs)
            echo "Keychain: $KEYCHAIN"
            for p12 in ~/Library/Developer/Xcode/UserData/Certificates/*.p12; do
              if [ -f "$p12" ]; then
                echo "Importing: $p12"
                security import "$p12" -k "$KEYCHAIN" -P "" -T /usr/bin/codesign -T /usr/bin/security 2>&1 || true
              fi
            done
            security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "" "$KEYCHAIN" 2>&1 || true
            echo "=== After manual import ==="
            security find-identity -v -p codesigning
            CERT_NAME=$(security find-identity -v -p codesigning | grep -i "distribution" | head -1 | sed 's/.*"\(.*\)"/\1/')
            echo "=== Detected certificate: '$CERT_NAME' ==="
          fi

          if [ -z "$CERT_NAME" ]; then
            echo "ERROR: No valid signing identity found!"
            exit 1
          fi

          # Fix CODE_SIGN_IDENTITY everywhere using the actual cert name
          sed -i '' "/CODE_SIGN_IDENTITY/s/= \"[^\"]*\"/= \"${CERT_NAME}\"/g" ios/App/App.xcodeproj/project.pbxproj
          find ios/ -name "*.xcconfig" -exec sed -i '' "s/CODE_SIGN_IDENTITY = .*/CODE_SIGN_IDENTITY = ${CERT_NAME}/g" {} \; 2>/dev/null || true

          echo "=== Final CODE_SIGN_IDENTITY ==="
          grep -n "CODE_SIGN_IDENTITY" ios/App/App.xcodeproj/project.pbxproj || true
      - name: Build iOS app
        script: |
          xcode-project build-ipa \
            --workspace "ios/App/App.xcworkspace" \
            --scheme "App" 2>&1 || {
            echo "=== XCODE BUILD LOGS ==="
            cat /tmp/xcodebuild_logs/*.log 2>/dev/null | tail -200
            echo "=== END LOGS ==="
            exit 1
          }
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
