workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 30
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Codemagic
    environment:
      groups:
        - signing
      vars:
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
      node: 18
      xcode: 16.2
      cocoapods: default
    scripts:
      - name: Install dependencies
        script: npm ci
      - name: Build web assets
        script: npm run build
      - name: Sync Capacitor
        script: npx cap sync ios
      - name: Install CocoaPods
        script: |
          cd ios/App
          pod install
      - name: Set up keychain
        script: keychain initialize
      - name: Fetch signing files
        script: |
          # Verify private key is available
          if [ -n "$CERTIFICATE_PRIVATE_KEY" ]; then
            echo "CERTIFICATE_PRIVATE_KEY is set (${#CERTIFICATE_PRIVATE_KEY} chars)"
          else
            echo "ERROR: CERTIFICATE_PRIVATE_KEY is not set!"
            exit 1
          fi

          # Revoke existing distribution certificates that may not match our key
          echo "=== Revoking mismatched distribution certificates ==="
          app-store-connect certificates list \
            --type IOS_DISTRIBUTION \
            --save 2>/dev/null || true

          # Try to find and revoke existing certs
          for cert_file in $(find . -name "*.p12" -o -name "*.cer" 2>/dev/null); do
            echo "Found cert file: $cert_file"
          done

          # Fetch signing files - will create new cert if none exists
          app-store-connect fetch-signing-files "app.getkeel" \
            --type IOS_APP_STORE \
            --create

          # Verify we got a valid signing identity
          echo "=== Verifying signing identity ==="
          security find-identity -v -p codesigning
          VALID_COUNT=$(security find-identity -v -p codesigning | tail -1 | grep -oE '[0-9]+')
          echo "Valid identities: $VALID_COUNT"

          if [ "$VALID_COUNT" = "0" ] || [ -z "$VALID_COUNT" ]; then
            echo ""
            echo "======================================================="
            echo "ERROR: No valid signing identity found!"
            echo "======================================================="
            echo ""
            echo "The CERTIFICATE_PRIVATE_KEY does not match the"
            echo "distribution certificate in Apple Developer Portal."
            echo ""
            echo "To fix: Go to Apple Developer Portal -> Certificates"
            echo "-> Revoke the Distribution certificate -> Rebuild."
            echo ""
            echo "URL: https://developer.apple.com/account/resources/certificates/list"
            echo "======================================================="
            exit 1
          fi
      - name: Set up code signing
        script: |
          xcode-project use-profiles

          # Get the actual identity from keychain
          CERT_NAME=$(security find-identity -v -p codesigning | grep -i "distribution" | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "Using certificate: $CERT_NAME"

          # Fix CODE_SIGN_IDENTITY in project (handles conditional [sdk=...] variants)
          sed -i '' "/CODE_SIGN_IDENTITY/s/= \"[^\"]*\"/= \"${CERT_NAME}\"/g" ios/App/App.xcodeproj/project.pbxproj
          find ios/ -name "*.xcconfig" -exec sed -i '' "s/CODE_SIGN_IDENTITY = .*/CODE_SIGN_IDENTITY = ${CERT_NAME}/g" {} \; 2>/dev/null || true

          echo "=== Final CODE_SIGN_IDENTITY ==="
          grep -n "CODE_SIGN_IDENTITY" ios/App/App.xcodeproj/project.pbxproj || true
      - name: Build iOS app
        script: |
          xcode-project build-ipa \
            --workspace "ios/App/App.xcworkspace" \
            --scheme "App" 2>&1 || {
            echo "=== XCODE BUILD LOGS ==="
            cat /tmp/xcodebuild_logs/*.log 2>/dev/null | tail -200
            echo "=== END LOGS ==="
            exit 1
          }
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
