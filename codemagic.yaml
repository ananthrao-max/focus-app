workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 30
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Codemagic
    environment:
      groups:
        - signing
      vars:
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
      node: 18
      xcode: 16.2
      cocoapods: default
    scripts:
      - name: Install dependencies
        script: npm ci
      - name: Build web assets
        script: npm run build
      - name: Sync Capacitor
        script: npx cap sync ios
      - name: Install CocoaPods
        script: |
          cd ios/App
          pod install
      - name: Set up keychain
        script: keychain initialize
      - name: Fetch signing files
        script: |
          app-store-connect fetch-signing-files "app.getkeel" \
            --type IOS_APP_STORE \
            --create
      - name: Set up code signing
        script: |
          xcode-project use-profiles
          echo "=== Xcode version ==="
          xcodebuild -version
          echo "=== Signing identities in keychain ==="
          security find-identity -v -p codesigning
          echo "=== CODE_SIGN_IDENTITY in project.pbxproj ==="
          grep -n "CODE_SIGN_IDENTITY" ios/App/App.xcodeproj/project.pbxproj || true
          echo "=== xcconfig files with CODE_SIGN ==="
          find ios/ -name "*.xcconfig" -exec grep -Hl "CODE_SIGN" {} \; 2>/dev/null || echo "No xcconfig files with CODE_SIGN"
          find ios/ -name "*.xcconfig" -exec grep -H "CODE_SIGN" {} \; 2>/dev/null || true
          echo "=== Provisioning profile details ==="
          for profile in ~/Library/MobileDevice/Provisioning\ Profiles/*.mobileprovision; do
            if [ -f "$profile" ]; then
              echo "--- $(basename "$profile") ---"
              security cms -D -i "$profile" 2>/dev/null | grep -A1 "Name" | head -4 || true
            fi
          done
          echo "=== Fixing CODE_SIGN_IDENTITY in project.pbxproj ==="
          sed -i '' 's/\(CODE_SIGN_IDENTITY[^=]*= \)"[^"]*"/\1"Apple Distribution"/g' ios/App/App.xcodeproj/project.pbxproj
          echo "=== Fixing CODE_SIGN_IDENTITY in ALL xcconfig files ==="
          find ios/ -name "*.xcconfig" -exec sed -i '' 's/CODE_SIGN_IDENTITY = .*/CODE_SIGN_IDENTITY = Apple Distribution/g' {} \; 2>/dev/null || true
          echo "=== After fix - project.pbxproj ==="
          grep -n "CODE_SIGN_IDENTITY" ios/App/App.xcodeproj/project.pbxproj || true
          echo "=== After fix - xcconfig files ==="
          find ios/ -name "*.xcconfig" -exec grep -H "CODE_SIGN_IDENTITY" {} \; 2>/dev/null || true
      - name: Build iOS app
        script: |
          xcode-project build-ipa \
            --workspace "ios/App/App.xcworkspace" \
            --scheme "App" 2>&1 || {
            echo "=== XCODE BUILD LOGS ==="
            cat /tmp/xcodebuild_logs/*.log 2>/dev/null | tail -200
            echo "=== END LOGS ==="
            exit 1
          }
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
